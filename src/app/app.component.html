<ng-container *ngIf="showAppShell">
  <div class="app-shell">
    <header class="app-header">
      <div class="app-header__brand">
        <span class="app-header__eyebrow">Sistema veterinario</span>
        <a [routerLink]="['/dashboard']" class="app-header__title">Panel veterinario</a>
      </div>

      <nav class="app-nav">
        <a [routerLink]="['/dashboard']" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
        <a *ngFor="let item of navItems" [routerLink]="[item.path]" routerLinkActive="is-active">{{ item.label }}</a>
      </nav>

      <div class="app-session">
        <span class="app-session__name">{{ fullName }}</span>
        <button type="button" class="btn btn-outline-secondary app-logout" (click)="logout()">
          Cerrar sesion
        </button>
      </div>
    </header>

    <main class="app-main">
      <router-outlet></router-outlet>
    </main>
  </div>
</ng-container>

<ng-container *ngIf="!showAppShell">
  <router-outlet></router-outlet>
</ng-container>
