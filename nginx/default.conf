server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Local Docker proxy to backend API. In future static deployments,
    # /api/* can be resolved by external infrastructure instead.
    location /api/api/ {
        rewrite ^/api/api/(.*)$ /api/$1 break;
        proxy_pass http://veterinary-system-api:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://veterinary-system-api:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Avoid serving a stale SPA shell after rebuilds. The hashed JS/CSS files
    # can stay cacheable, but index.html must always point to the latest bundle.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
